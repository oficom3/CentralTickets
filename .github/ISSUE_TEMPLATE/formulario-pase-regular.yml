name: "🛠️ Solicitud de Pase Regular"
description: "Formulario técnico para un intento de despliegue regular a producción."
title: "Sub-Issue - [REGULAR]: "

labels: ["ticket-regular"]

body:
  - type: markdown
    attributes:
      value: |
        # ⚙️ Instructivo Técnico de Despliegue
        Este subissue documenta un **intento específico de despliegue**.

        Si este flujo resulta rechazado, este issue será cerrado y deberá abrir uno nuevo vinculado al Issue Padre para el reintento.

  - type: input
    id: id_commit
    attributes:
      label: "🆔 Hash o ID del Commit"
      description: "Identificador único (SHA o Tag) del código fuente que se desplegará."
      placeholder: "e.g., 7a1b2c3 o DATA-12345"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: dropdown
    id: modo_despliegue
    attributes:
      label: "👥 Modo Despliegue"
      options:
        - "full"
        - "full_no_sp"
    validations:
      required: true

  - type: textarea
    id: instructivos_certificacion
    attributes:
      label: "🧪 Despliegue en Certificación (UAT)"
      description: "Secuencia técnica paso a paso para el entorno de pruebas."
      placeholder: |
        Ejemplo:
        1. Ejecutar: src/migraciones/script_v1.0.sql
        2. Disparar workflow: workflow_clientes_uat.yml
    validations:
      required: true

  - type: textarea
    id: instructivos_produccion
    attributes:
      label: "🚀 Despliegue en Producción (PROD)"
      description: "Secuencia técnica exacta a ejecutar por el GitHub Action en el entorno productivo."
      placeholder: |
        1. Ejecutar: src/migraciones/script_v1.0.sql
        2. Actualizar variables de entorno: [Nombre de variable]
    validations:
      required: true

  - type: textarea
    id: instructivos_reversion
    attributes:
      label: "🔄 Plan de Contingencia y Reversión (Rollback)"
      description: "Pasos críticos para restaurar el entorno ante una falla en el despliegue."
      placeholder: |
        1. Ejecutar script de rollback: src/rollback/rollback_v1.0.sql
        2. Revertir versión del despliegue al commit: [ID del commit anterior]
    validations:
      required: true