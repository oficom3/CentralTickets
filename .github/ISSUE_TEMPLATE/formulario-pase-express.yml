name: "⚡ Solicitud de Pase Express"
description: "Formulario técnico simplificado para un intento de despliegue rápido o de bajo riesgo."
title: "Sub-Issue - [EXPRESS]: "

labels: ["ticket-express"]

body:
  - type: markdown
    attributes:
      value: |
        # ⚡ Instructivo Técnico de Despliegue (Express)
        Este subissue documenta un **intento específico de despliegue rápido**. Exclusivo para cambios de bajo impacto o parches urgentes. 
        
        Si este flujo resulta rechazado, este issue será cerrado y deberá abrir uno nuevo vinculado al Issue Padre para el reintento.

  - type: input
    id: id_commit
    attributes:
      label: "🆔 Hash o ID del Commit"
      description: "Identificador único (SHA o Tag) del código fuente que se desplegará."
      placeholder: "e.g., 7a1b2c3 o DATA-12345"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: dropdown
    id: modo_despliegue
    attributes:
      label: "👥 Modo Despliegue"
      options:
        - "register_sql_only"
        - "execute_sp_only"
    validations:
      required: true

  - type: textarea
    id: instructivos_despliegue
    attributes:
      label: "🚀 Secuencia de Despliegue en Certi y Prod"
      description: "Secuencia técnica exacta a ejecutar por el GitHub Action en los entornos de certificación y productivo."
      placeholder: |
        Ejemplo:
        1. Ejecutar: src/parches/fix_hotfix.sql
        2. Reiniciar pipeline de ingesta.
    validations:
      required: true

  - type: textarea
    id: instructivos_reversion
    attributes:
      label: "🔄 Plan de Contingencia y Reversión (Rollback)"
      description: "Pasos críticos para restaurar el entorno de inmediato ante una falla en el despliegue."
      placeholder: |
        1. Ejecutar script de rollback: src/rollback/rollback_hotfix.sql
        2. Revertir versión del despliegue al commit anterior estable.
    validations:
      required: true
