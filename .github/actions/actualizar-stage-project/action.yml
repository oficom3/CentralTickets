# PROPUESTA PARA DATAOPS — no fusionar sin su revisión.
# Ubicación real sugerida dentro del repo: .github/actions/actualizar-stage-project/action.yml
#
# Qué hace: dado el número de Issue y el nombre legible del stage (ej. "Revisión de Checklist"),
# busca el item correspondiente en el Project y actualiza su campo "Compuerta" a ese valor.
#
# IDs ya completados (Project: https://github.com/users/oficom3/projects/5).
# ⚠️ Este Project es de una cuenta PERSONAL, no de una organización — por eso PROJECT_TOKEN
# debe crearse como secret en CADA repo que use esta acción (Settings → Secrets and variables →
# Actions → New repository secret), no como secret de organización.

name: "Actualizar stage en el Project"
description: "Mueve el ticket a la columna correspondiente del Project de Data Release"
inputs:
  issue_number:
    description: "Número de la Issue (padre o sub-issue) a actualizar"
    required: true
  stage_name:
    description: >
      Nombre EXACTO de la opción del campo 'Compuerta', tal como aparece en el Project.
      Valores válidos: Solicitud de Pase | Revisión de Checklist | Aprobación de Seguridad |
      Planificación DataOps | Despliegue en Certificación | Despliegue + Validación Cert |
      Pendiente de Reintento | Despliegue en Producción | Validación Técnica — Producción |
      Validación Funcional — Producción (apoyo) | Aprobado | Reversión en Producción
    required: true

runs:
  using: "composite"
  steps:
    - name: Resolver IDs y actualizar campo del Project
      uses: actions/github-script@v7
      with:
        github-token: ${{ env.PROJECT_TOKEN }}
        script: |
          const PROJECT_ID   = "PVT_kwHOEam8Dc4Bd3YZ";
          const FIELD_ID     = "PVTSSF_lAHOEam8Dc4Bd3YZzhYVyBU";  // campo "Compuerta"
          const issueNumber  = Number("${{ inputs.issue_number }}");
          const stageName    = "${{ inputs.stage_name }}";

          const OPTION_ID_BY_STAGE = {
            "Solicitud de Pase": "133f31ad",
            "Revisión de Checklist": "1225f3a3",
            "Aprobación de Seguridad": "4df5ec18",
            "Planificación DataOps": "033857dc",
            "Despliegue en Certificación": "73d80e32",
            "Despliegue + Validación Cert": "1f350f39",
            "Pendiente de Reintento": "26d8b7c9",
            "Despliegue en Producción": "bd9c05cb",
            "Validación Técnica — Producción": "0682a734",
            "Validación Funcional — Producción (apoyo)": "a38f5a95",
            "Aprobado": "1b48f821",
            "Reversión en Producción": "d1622cac",
          };

          const optionId = OPTION_ID_BY_STAGE[stageName];
          if (!optionId) {
            core.setFailed(`Stage "${stageName}" no está mapeado a un option_id. Revisar OPTION_ID_BY_STAGE.`);
            return;
          }

          // 1. Obtener el node_id de la Issue
          const issue = await github.rest.issues.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
          });
          const issueNodeId = issue.data.node_id;

          // 2. Buscar el item de ese Issue dentro del Project (puede no estar agregado aún)
          const findItemQuery = await github.graphql(`
            query($issueId: ID!) {
              node(id: $issueId) {
                ... on Issue {
                  projectItems(first: 10) {
                    nodes { id project { id } }
                  }
                }
              }
            }
          `, { issueId: issueNodeId });

          const items = findItemQuery.node.projectItems.nodes;
          const item = items.find(i => i.project.id === PROJECT_ID);

          if (!item) {
            core.warning(`Issue #${issueNumber} no está agregada al Project todavía — no se pudo actualizar el stage.`);
            return;
          }

          // 3. Actualizar el campo "Compuerta" al valor del stage actual
          await github.graphql(`
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) { clientMutationId }
            }
          `, { projectId: PROJECT_ID, itemId: item.id, fieldId: FIELD_ID, optionId });

          core.info(`Issue #${issueNumber} movida a "${stageName}"`);
