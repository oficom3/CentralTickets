name: Ticket Manager
run-name: "Ticket #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:

  detectar_ticket:

    runs-on: ubuntu-latest

    outputs:

      es_regular: ${{ steps.validacion.outputs.es_regular }}

      es_express: ${{ steps.validacion.outputs.es_express }}

    steps:

      - name: Detectar tipo de ticket

        id: validacion

        run: |

          LABELS='${{ join(github.event.issue.labels.*.name, ',') }}'

          echo "Labels detectados: $LABELS"

          if [[ "$LABELS" == *"ticket-regular"* ]]; then
            echo "es_regular=true" >> $GITHUB_OUTPUT
          else
            echo "es_regular=false" >> $GITHUB_OUTPUT
          fi

          if [[ "$LABELS" == *"ticket-express"* ]]; then
            echo "es_express=true" >> $GITHUB_OUTPUT
          else
            echo "es_express=false" >> $GITHUB_OUTPUT
          fi

  flujo_regular:

    needs: detectar_ticket

    if: needs.detectar_ticket.outputs.es_regular == 'true'

    uses: ./.github/workflows/ticket-regular.yml

    secrets: inherit

    with:

      issue_number: ${{ github.event.issue.number }}

      issue_title: ${{ github.event.issue.title }}

      issue_author: ${{ github.event.issue.user.login }}

  flujo_express:

    needs: detectar_ticket

    if: needs.detectar_ticket.outputs.es_express == 'true'

    uses: ./.github/workflows/ticket-express.yml

    secrets: inherit

    with:

      issue_number: ${{ github.event.issue.number }}

      issue_title: ${{ github.event.issue.title }}

      issue_author: ${{ github.event.issue.user.login }}

  cierre_issue:

    needs:
      - flujo_regular
      - flujo_express

    if: always() && (needs.flujo_regular.result == 'success' || needs.flujo_express.result == 'success' || needs.flujo_regular.result == 'failure' || needs.flujo_express.result == 'failure')

    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:

      - name: Cerrar Issue

        uses: actions/github-script@v7

        with:

          script: |

            await github.rest.issues.update({

              owner: context.repo.owner,

              repo: context.repo.repo,

              issue_number: ${{ github.event.issue.number }},

              state: 'closed'

            })

      - name: Confirmacion

        run: |

          echo "========================================"
          echo "Issue cerrada automaticamente"
          echo "Numero: ${{ github.event.issue.number }}"
          echo "========================================"
