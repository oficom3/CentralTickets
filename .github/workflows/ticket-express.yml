name: Ticket Express

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_author:
        required: true
        type: string

permissions:
  issues: write

jobs:
  solicitud_pase:
    runs-on: ubuntu-latest
    # Mapeamos los resultados del parser a outputs del JOB para que otros jobs puedan usarlos
    outputs:
      commit_sha: ${{ steps.extraer_datos.outputs.commit_sha }}
      modo_deploy: ${{ steps.extraer_datos.outputs.modo_deploy }}
    steps:
      # 1. Descarga el código del repositorio al contenedor
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      # 2. Ejecutar el parseador oficial de IssueOps
      - name: Parsear Formulario Técnico Regular
        id: parse
        uses: issue-ops/parser@v5.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: formulario-pase-express.yml

      # 3. Procesar el JSON devuelto por la acción usando jq
      - name: Extraer y Validar Datos del JSON
        id: extraer_datos
        run: |
          JSON_DATA='${{ steps.parse.outputs.json }}'
          
          # Extraemos el valor del commit
          COMMIT=$(echo "$JSON_DATA" | jq -r '.id_commit // empty')

          MODO=$(echo "$JSON_DATA" | jq -r 'if (.modo_despliegue | type) == "array" then .modo_despliegue[0] else .modo_despliegue end // empty')
          
          echo "Commit detectado: $COMMIT"
          echo "Modo detectado: $MODO"
          
          # Guardamos en los outputs de forma segura en una sola línea
          echo "commit_sha=$COMMIT" >> $GITHUB_OUTPUT
          echo "modo_deploy=$MODO" >> $GITHUB_OUTPUT

      - name: Inicializar solicitud
        run: |
          echo "Issue Express recibida"
          echo "Numero: ${{ inputs.issue_number }}"
          echo "Titulo: ${{ inputs.issue_title }}"
          echo "Solicitante: ${{ inputs.issue_author }}"

      - name: Registrar inicio
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Solicitud de pase Express recibida.\n\n**Detalles Técnicos Detectados:**\n- **Commit:** `${{ steps.extraer_datos.outputs.commit_sha }}`\n- **Modo:** `${{ steps.extraer_datos.outputs.modo_deploy }}`\n\nInicio del flujo.'
            })

  stage_revision_checklist:
    needs: solicitud_pase
    runs-on: ubuntu-latest
    environment: Revision-Checklist
    steps:
      - run: echo "Checklist aprobado"
      - name: Registrar checklist
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Checklist aprobado.'
            })

  stage_aprobacion_seguridad:
    needs: stage_revision_checklist
    runs-on: ubuntu-latest
    environment: Aprobacion-Seguridad
    steps:
      - run: echo "Seguridad aprobada"
      - name: Registrar seguridad
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Aprobación de Seguridad completada.'
            })

  deploy_cert:
    needs: stage_aprobacion_seguridad
    uses: ./.github/workflows/deploy-cert.yml
    secrets: inherit
    with:
      repository: SquadCredicorpData
      environment: CERT

  comentario_cert:
    needs: deploy_cert
    runs-on: ubuntu-latest
    steps:
      - name: Registrar CERT
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Despliegue y validación funcional CERT completados.'
            })

  deploy_prod:
    needs: comentario_cert
    uses: ./.github/workflows/deploy-prod.yml
    secrets: inherit
    with:
      repository: SquadCredicorpData
      environment: PROD

  comentario_prod:
    needs: deploy_prod
    runs-on: ubuntu-latest
    steps:
      - name: Registrar PROD
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Despliegue y validación técnica en PROD completados.'
            })

  stage_validacion_tecnica:
    needs: comentario_prod
    runs-on: ubuntu-latest
    environment: Validacion-Tecnica-Produccion
    steps:
      - run: |
          echo "Validando logs, jobs y pipelines..."
          echo "Validacion tecnica OK"

      - name: Asignar Label Finalizado e Informar Éxito
        uses: actions/github-script@v7
        with:
          script: |
            // Añadir el label requerido por CentralTicketManager
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['finalizado']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '🚀 **Validación técnica completada:** Flujo Express finalizado exitosamente. Transfiriendo control al Manager para el cierre.'
            });

  notificar_rechazo:
    needs:
      - solicitud_pase
      - stage_revision_checklist
      - stage_aprobacion_seguridad
      - deploy_cert
      - comentario_cert
    # anyof(failed) evalúa si CUALQUIERA de los jobs anteriores falló o fue rechazado
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Asignar Label de Rechazo y Registrar Error
        uses: actions/github-script@v7
        with:
          script: |
            // Añadir el label requerido por CentralTicketManager para reintentos
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['rechazado']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '❌ **Flujo Express Detenido:** Se detectó un rechazo manual en las aprobaciones o un error crítico en el pipeline técnico.'
            });

  stage_aprobado:
    needs: stage_validacion_tecnica
    runs-on: ubuntu-latest
    steps:
      - name: Marcar ticket aprobado
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['finalizado']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Pase Regular completado exitosamente. Transfiriendo control al Manager para el cierre formal.'
            })

  stage_reversion_prod:
    needs:
      - deploy_prod
      - comentario_prod
      - stage_validacion_tecnica
    # Evalúa fallos únicamente dentro del ciclo productivo real
    if: always() && (needs.deploy_prod.result == 'failure' || needs.comentario_prod.result == 'failure' || needs.stage_validacion_tecnica.result == 'failure')
    runs-on: ubuntu-latest
    environment: Reversion-Produccion
    steps:
      - name: Registrar reversión requerida
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['reversion-requerida']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '🔄 **Alerta de Reversión en Producción:** Se ha detectado un fallo post-despliegue. La Issue permanecerá abierta para la ejecución manual del Rollback.'
            })