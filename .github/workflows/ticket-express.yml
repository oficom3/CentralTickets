# ⚠️ PROPUESTA PARA DATAOPS — NO fusionar sin su revisión y sin completar los TODO
# de .github/actions/actualizar-stage-project/action.yml (PROJECT_ID, FIELD_ID_COMPUERTA, option_ids).
# Requiere el mismo secret PROJECT_TOKEN usado en ticket-regular.PROPUESTA.yml.
#
# Nota: el flujo Express usa un subconjunto de las 12 opciones de "Compuerta" — no pasa por
# "Planificación DataOps" ni tiene una "Validación Funcional — Producción" separada (todo se
# resuelve en un solo job 'stage_validacion_tecnica' al final). Igual que en Regular, 'deploy_cert'
# y 'deploy_prod' no tienen 'steps:' propios, así que se agregaron dos jobs pequeños aparte.

name: Ticket Express

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_author:
        required: true
        type: string

permissions:
  issues: write

env:
  PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}   # PROPUESTA: mismo secret usado en ticket-regular.yml

jobs:
  solicitud_pase:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.extraer_datos.outputs.commit_sha }}
      modo_deploy: ${{ steps.extraer_datos.outputs.modo_deploy }}
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Solicitud de Pase"

      # ⬇️ steps originales, sin cambios
      - name: Parsear Formulario Técnico Regular
        id: parse
        uses: issue-ops/parser@v5.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: formulario-pase-express.yml

      - name: Extraer y Validar Datos del JSON
        id: extraer_datos
        run: |
          JSON_DATA='${{ steps.parse.outputs.json }}'
          COMMIT=$(echo "$JSON_DATA" | jq -r '.id_commit // empty')
          MODO=$(echo "$JSON_DATA" | jq -r 'if (.modo_despliegue | type) == "array" then .modo_despliegue[0] else .modo_despliegue end // empty')
          echo "Commit detectado: $COMMIT"
          echo "Modo detectado: $MODO"
          echo "commit_sha=$COMMIT" >> $GITHUB_OUTPUT
          echo "modo_deploy=$MODO" >> $GITHUB_OUTPUT

      - name: Inicializar solicitud
        run: |
          echo "Issue Express recibida"
          echo "Numero: ${{ inputs.issue_number }}"
          echo "Titulo: ${{ inputs.issue_title }}"
          echo "Solicitante: ${{ inputs.issue_author }}"

      - name: Registrar inicio
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Solicitud de pase Express recibida.\n\n**Detalles Técnicos Detectados:**\n- **Commit:** `${{ steps.extraer_datos.outputs.commit_sha }}`\n- **Modo:** `${{ steps.extraer_datos.outputs.modo_deploy }}`\n\nInicio del flujo.'
            })

  stage_revision_checklist:
    needs: solicitud_pase
    runs-on: ubuntu-latest
    environment: Revision-Checklist
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Revisión de Checklist"

      # ⬇️ steps originales
      - run: echo "Checklist aprobado"
      - name: Registrar checklist
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Checklist aprobado.'
            })

  stage_aprobacion_seguridad:
    needs: stage_revision_checklist
    runs-on: ubuntu-latest
    environment: Aprobacion-Seguridad
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Aprobación de Seguridad"

      # ⬇️ steps originales
      - run: echo "Seguridad aprobada"
      - name: Registrar seguridad
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Aprobación de Seguridad completada.'
            })

  deploy_cert:
    needs: stage_aprobacion_seguridad
    uses: ./.github/workflows/deploy-cert.yml   # sin 'steps:' propios — no se le puede insertar nada aquí
    secrets: inherit
    with:
      repository: SquadCredicorpData
      environment: CERT

  # ⬇️ JOB NUEVO — cubre el stage de deploy_cert sin tocar el workflow reusable compartido
  actualizar_stage_deploy_cert:
    needs: deploy_cert
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Despliegue en Certificación"

  comentario_cert:
    needs: deploy_cert
    runs-on: ubuntu-latest
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Despliegue + Validación Cert"

      # ⬇️ step original
      - name: Registrar CERT
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Despliegue y validación funcional CERT completados.'
            })

  deploy_prod:
    needs: comentario_cert
    uses: ./.github/workflows/deploy-prod.yml   # sin 'steps:' propios — no se le puede insertar nada aquí
    secrets: inherit
    with:
      repository: SquadCredicorpData
      environment: PROD

  # ⬇️ JOB NUEVO — cubre el stage de deploy_prod sin tocar el workflow reusable compartido
  actualizar_stage_deploy_prod:
    needs: deploy_prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Despliegue en Producción"

  comentario_prod:
    needs: deploy_prod
    runs-on: ubuntu-latest
    steps:
      # No se agrega step aquí a propósito: solo publica un comentario, la actualización de
      # stage de "Despliegue en Producción" ya la cubre el job 'actualizar_stage_deploy_prod'
      # de arriba, y la siguiente distinta (Validación Técnica) la cubre 'stage_validacion_tecnica'.
      - name: Registrar PROD
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Despliegue y validación técnica en PROD completados.'
            })

  stage_validacion_tecnica:
    needs: comentario_prod
    runs-on: ubuntu-latest
    environment: Validacion-Tecnica-Produccion
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Validación Técnica — Producción"

      # ⬇️ steps originales
      - run: |
          echo "Validando logs, jobs y pipelines..."
          echo "Validacion tecnica OK"

      - name: Asignar Label Finalizado e Informar Éxito
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['finalizado']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '🚀 **Validación técnica completada:** Flujo Express finalizado exitosamente. Transfiriendo control al Manager para el cierre.'
            });

  notificar_rechazo:
    needs:
      - solicitud_pase
      - stage_revision_checklist
      - stage_aprobacion_seguridad
      - deploy_cert
      - comentario_cert
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Pendiente de Reintento"

      # ⬇️ steps originales
      - name: Asignar Label de Rechazo y Registrar Error
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['rechazado']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '❌ **Flujo Express Detenido:** Se detectó un rechazo manual en las aprobaciones o un error crítico en el pipeline técnico.'
            });

  stage_aprobado:
    needs: stage_validacion_tecnica
    runs-on: ubuntu-latest
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Aprobado"

      # ⬇️ step original — NOTA: el mensaje dice "Pase Regular" pero este es el flujo Express;
      # parece un texto copiado sin ajustar. No lo corregí para no alterar lógica de negocio sin
      # que DataOps lo confirme, pero vale la pena señalárselo aparte.
      - name: Marcar ticket aprobado
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['finalizado']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '✅ Pase Regular completado exitosamente. Transfiriendo control al Manager para el cierre formal.'
            })

  stage_reversion_prod:
    needs:
      - deploy_prod
      - comentario_prod
      - stage_validacion_tecnica
    if: always() && (needs.deploy_prod.result == 'failure' || needs.comentario_prod.result == 'failure' || needs.stage_validacion_tecnica.result == 'failure')
    runs-on: ubuntu-latest
    environment: Reversion-Produccion
    steps:
      # ⬇️ NUEVO (checkout agregado — la acción local lo requiere)
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Actualizar stage en el Project
        uses: ./.github/actions/actualizar-stage-project
        with:
          issue_number: ${{ inputs.issue_number }}
          stage_name: "Reversión en Producción"

      # ⬇️ steps originales
      - name: Registrar reversión requerida
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              labels: ['reversion-requerida']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: '🔄 **Alerta de Reversión en Producción:** Se ha detectado un fallo post-despliegue. La Issue permanecerá abierta para la ejecución manual del Rollback.'
            })
